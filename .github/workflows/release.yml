name: Release

on:
  push:
    tags:
      - "v*"

# id-token enables npm trusted publishing (OIDC): no NPM_TOKEN secret, and the
# npm account's 2FA-on-publish requirement (EOTP) does not apply to CI.
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # No registry-url here: setup-node would write an .npmrc that expands
      # ${NODE_AUTH_TOKEN}, which no longer exists under trusted publishing.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Trusted publishing needs npm >= 11.5; Node 22 bundles npm 10.
      - name: Update npm for trusted publishing
        run: npm install -g npm@11

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # Keeps re-tagging idempotent: a version already on npm is skipped, not re-published
      - name: Check if version is already on npm
        id: npm-check
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if npm view "opencode-persona@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "opencode-persona@$PKG_VERSION is already on npm, skipping publish"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      # The prepublishOnly gate runs as explicit steps so a failure is visible
      # per phase in the run summary; publish then skips the lifecycle rerun.
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        if: steps.npm-check.outputs.published == 'false'
        run: npm publish --ignore-scripts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
